name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      with:
        go-version: '1.26'

    - name: Run tests
      run: go test -v ./...

    - name: Build binary
      run: |
        GOOS=linux GOARCH=amd64 go build -o thread-route-updater-linux-amd64 .
        GOOS=linux GOARCH=arm64 go build -o thread-route-updater-linux-arm64 .
        GOOS=darwin GOARCH=amd64 go build -o thread-route-updater-darwin-amd64 .
        GOOS=darwin GOARCH=arm64 go build -o thread-route-updater-darwin-arm64 .
        GOOS=windows GOARCH=amd64 go build -o thread-route-updater-windows-amd64.exe .

    - name: Create checksums
      run: |
        sha256sum thread-route-updater-* > checksums.txt

    - name: Create Release
      uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
      with:
        files: |
          thread-route-updater-*
          checksums.txt
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-helm-chart:
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: Set up Helm
      uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
      with:
        version: '4.2.2'

    - name: Package Helm chart
      run: |
        helm package chart/thread-route-updater --destination ./packages

    - name: Log in to Container Registry
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push Helm chart to OCI registry
      run: |
        helm push ./packages/thread-route-updater-*.tgz oci://${{ env.REGISTRY }}/${{ github.repository }}
